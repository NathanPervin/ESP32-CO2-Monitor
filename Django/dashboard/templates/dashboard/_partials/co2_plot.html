{% if has_data %}

  <!-- Session info bar -->
  <div style="display:flex; gap:2rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap;">
    <h2 style="margin:0;">{{ building }} — Room {{ room }}</h2>
    <span style="
      padding:2px 10px; border-radius:999px; font-size:.85rem; font-weight:600;
      {% if mode == 'ambient' %}background:#dbeafe; color:#1d4ed8;
      {% else %}background:#dcfce7; color:#15803d;{% endif %}">
      {{ mode }}
    </span>
  </div>

  <div style="display:flex; gap:2rem; font-size:.9rem; color:#6b7280; margin-bottom:1.5rem; flex-wrap:wrap; align-items:center;">
    <span>Start: <strong style="color:#111;">{{ start_fmt }}</strong></span>
    <span>End: <strong style="color:#111;">{{ end_fmt }}</strong></span>
    <span>Duration: <strong style="color:#111;">{{ duration }}</strong></span>
    <span>Readings: <strong style="color:#111;">{{ count }}</strong></span>
    {% if live %}
    <span style="display:flex; align-items:center; gap:.4rem;">
      <span style="
        width:8px; height:8px; border-radius:50%; background:#16a34a;
        box-shadow:0 0 0 0 rgba(22,163,74,.6);
        animation:live-pulse 1.4s ease-out infinite;">
      </span>
      <strong style="color:#16a34a; font-size:.85rem;">Live</strong>
    </span>
    <style>
      @keyframes live-pulse {
        0%   { box-shadow: 0 0 0 0 rgba(22,163,74,.6); }
        70%  { box-shadow: 0 0 0 6px rgba(22,163,74,0); }
        100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
      }
    </style>
    {% endif %}
  </div>

  <div id="co2-plot" style="width:100%; height:500px;"></div>

{% else %}
  <p>No data found for this session.</p>
{% endif %}

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
{% if has_data %}
<script>
(function () {
  const dataUrl = "{% url 'get_session_data' session_id %}";

  fetch(dataUrl)
    .then(r => r.json())
    .then(data => {
      if (!data.timestamps.length) {
        document.getElementById('co2-plot').innerHTML = '<p>No readings found.</p>';
        return;
      }

      Plotly.newPlot('co2-plot', [{
        x: data.timestamps.map(ts => new Date(ts * 1000)),
        y: data.co2,
        type: 'scatter',
        mode: 'lines',
        line: { color: '#00bb10', width: 1.5 },
        name: 'CO₂ (ppm)',
      }], {
        xaxis: {
          title: 'Time',
          type: 'date',
        },
        yaxis: {
          title: 'CO₂ (ppm)',
          rangemode: 'tozero',
        },
        margin: { t: 20 },
        shapes: [{
          // 2000 ppm warning threshold line
          type: 'line', xref: 'paper', x0: 0, x1: 1,
          yref: 'y', y0: 2000, y1: 2000,
          line: { color: 'red', width: 1, dash: 'dot' }
        }],
      }, {
        responsive: true,
        scrollZoom: true,
        displayModeBar: true,
        modeBarButtonsToRemove: ['select2d', 'lasso2d'],
      });

      window.addEventListener('resize', () => {
        Plotly.relayout('co2-plot', { autosize: true });
      });
    });
})();
</script>
{% endif %}
